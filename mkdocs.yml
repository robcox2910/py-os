site_name: PyOS
site_url: https://robcox2910.github.io/py-os/
site_description: A simulated operating system built in Python for learning OS concepts
repo_url: https://github.com/robcox2910/py-os
repo_name: robcox2910/py-os

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - Shell Reference: shell-reference.md
  - Architecture: architecture.md
  - Visual Guide: diagrams.md
  - Concepts:
      - What Is an OS?: concepts/what-is-an-os.md
      - Processes: concepts/processes.md
      - Memory: concepts/memory.md
      - Filesystem: concepts/filesystem.md
      - The Kernel: concepts/kernel-and-syscalls.md
      - The Shell: concepts/shell.md
      - Devices and Networking: concepts/devices-and-networking.md
      - Users and Safety: concepts/users-and-safety.md
      - Interrupts and Timers: concepts/interrupts.md
      - "TCP: Reliable Delivery": concepts/tcp.md
      - Synchronization: concepts/synchronization.md
      - The Boot Chain: concepts/bootloader.md
      - Interactive Tutorials: concepts/tutorials.md
      - Framebuffer: concepts/framebuffer.md
      - TUI Dashboard: concepts/tui.md
      - Web UI: concepts/web-ui.md
      - Permissions: concepts/permissions.md
      - Binary Loader: concepts/binary-loader.md
      - Containers: concepts/containers.md
      - Inter-Machine Networking: concepts/inter-machine-networking.md
